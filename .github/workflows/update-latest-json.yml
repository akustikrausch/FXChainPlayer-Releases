name: Update latest.json

on:
  release:
    types: [published]

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Find the installer asset
          ASSET_URL=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | test("Setup.*\\.exe$")) | .url')
          ASSET_NAME=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | test("Setup.*\\.exe$")) | .name')
          ASSET_SIZE=$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name | test("Setup.*\\.exe$")) | .size')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$ASSET_NAME"

          echo "asset_name=$ASSET_NAME" >> $GITHUB_OUTPUT
          echo "asset_size=$ASSET_SIZE" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      - name: Download installer and compute SHA256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ steps.release.outputs.tag }}" --pattern "*Setup*.exe" --dir /tmp/
          SHA256=$(sha256sum /tmp/${{ steps.release.outputs.asset_name }} | cut -d' ' -f1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
        id: hash

      - name: Generate latest.json
        run: |
          BODY=$(gh release view "${{ steps.release.outputs.tag }}" --json body --jq .body)

          cat > latest.json << ENDJSON
          {
            "version": "${{ steps.release.outputs.version }}",
            "date": "$(date -u +%Y-%m-%d)",
            "installer": {
              "url": "${{ steps.release.outputs.download_url }}",
              "size": ${{ steps.release.outputs.asset_size }},
              "sha256": "${{ steps.hash.outputs.sha256 }}"
            },
            "changelog": $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
            "minVersion": "0.20.0"
          }
          ENDJSON

          # Validate JSON
          python3 -c "import json; json.load(open('latest.json'))"
          echo "Generated latest.json:"
          cat latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push latest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git diff --cached --quiet || (git commit -m "Update latest.json to v${{ steps.release.outputs.version }}" && git push)
